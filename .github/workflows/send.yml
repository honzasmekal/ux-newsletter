name: Newsletter send (pondělí)

on:
  schedule:
    # Pondělí ~07:00 CEST = 05:00 UTC. Pozn.: v zimě (CET) vyjde o hodinu jinak — viz spec.
    - cron: "0 5 * * 1"
  workflow_dispatch: {} # manuální spuštění pro test

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: node --import tsx src/cli.ts send
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM: ${{ secrets.NEWSLETTER_FROM }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
